name: Release

# On a version tag (for example v0.1.0), rebuild the package and attach the zip
# plus its SHA-256 to a GitHub Release. The zip carries manifest.json at the root
# so it loads unpacked and uploads to the Edge Add-ons / Chrome Web Store as-is.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches the tag
        run: |
          manifest_version=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' src/manifest.json | grep -oE '[0-9]+(\.[0-9]+)*')
          if [ "$manifest_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "manifest.json version ($manifest_version) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Package
        run: sh scripts/package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/actblue-keepalive.zip
            dist/actblue-keepalive.zip.sha256
          generate_release_notes: true
