name: Release

# Packages the unpacked extension into a verifiable zip when a version tag is
# pushed (for example v0.1.0), and attaches it plus a SHA-256 checksum to the
# GitHub Release. manifest.json lands at the zip root so the artifact loads
# unpacked and uploads to the Edge Add-ons / Chrome Web Store dashboards as-is.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches the tag
        run: |
          manifest_version=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' src/manifest.json | grep -oE '[0-9]+(\.[0-9]+)*')
          if [ "$manifest_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "manifest.json version ($manifest_version) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Package (manifest.json at zip root)
        run: |
          cd src
          zip -r "../actblue-keepalive-v${{ steps.ver.outputs.version }}.zip" . -x '*.DS_Store'
          cd ..
          sha256sum "actblue-keepalive-v${{ steps.ver.outputs.version }}.zip" > "actblue-keepalive-v${{ steps.ver.outputs.version }}.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            actblue-keepalive-v${{ steps.ver.outputs.version }}.zip
            actblue-keepalive-v${{ steps.ver.outputs.version }}.zip.sha256
          generate_release_notes: true
